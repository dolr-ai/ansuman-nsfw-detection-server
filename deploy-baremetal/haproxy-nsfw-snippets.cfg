# Add these stanzas to the host-level HAProxy config on both ansuman nodes.
# Host app port: 8001
# HAProxy bridge port: 18082
# Public host: nsfw.ansuman.yral.com

# If the existing HTTPS frontend does not use a host->backend map, add:
#   use_backend be_nsfw_app if { hdr(host) -i nsfw.ansuman.yral.com }
#
# If it uses a map file, append the line from host2backend.map.append instead.

frontend fe_nsfw_bridge
    bind 127.0.0.1:18082
    bind ${TAILSCALE_NODE_IP}:18082
    mode http
    option httplog
    default_backend be_local_nsfw_app

backend be_local_nsfw_app
    mode http
    option httpchk GET /health
    option forwardfor if-none
    http-check expect status 200
    http-request set-header X-Real-IP %[src] if !{ req.hdr(X-Real-IP) -m found }
    http-request set-header X-Forwarded-Proto http if !{ req.hdr(X-Forwarded-Proto) -m found }
    server local_nsfw 127.0.0.1:8001 check

backend be_nsfw_app
    mode http
    balance roundrobin
    option httpchk GET /health
    option forwardfor if-none
    http-check expect status 200
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    http-request set-header X-Forwarded-Proto http if !{ ssl_fc }
    http-request set-header X-Real-IP %[req.hdr(CF-Connecting-IP)] if { req.hdr(CF-Connecting-IP) -m found }
    http-request set-header X-Forwarded-For %[req.hdr(CF-Connecting-IP)] if { req.hdr(CF-Connecting-IP) -m found }
    http-request set-header X-Real-IP %[src] if !{ req.hdr(CF-Connecting-IP) -m found }
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Frame-Options "DENY"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
    server ansuman1 100.78.17.101:18082 check
    server ansuman2 100.79.99.107:18082 check
